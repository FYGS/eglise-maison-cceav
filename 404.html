<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page introuvable — CCEAV</title>
  <link rel="stylesheet" href="assets/styles/main.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: var(--sp-8);
    }
    .error-page__code {
      font-size: 6rem;
      font-weight: 800;
      background: var(--grad-header);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .error-page__title {
      font-size: var(--fs-xl);
      margin-top: var(--sp-4);
    }
    .error-page__text {
      color: var(--c-text-muted);
      margin-top: var(--sp-2);
    }
    .error-page__link {
      display: inline-block;
      margin-top: var(--sp-6);
      padding: var(--sp-3) var(--sp-8);
      background: var(--c-accent);
      color: #fff;
      border-radius: var(--r-full);
      font-weight: 600;
      transition: opacity var(--dur) var(--ease);
    }
    .error-page__link:hover { opacity: .85; }
  </style>
</head>
<body>
  <main class="error-page">
    <p class="error-page__code">404</p>
    <h1 class="error-page__title">Page introuvable</h1>
    <p class="error-page__text">La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="index.html" class="error-page__link">Retour à l'accueil</a>
  </main>
</body>
</html>
